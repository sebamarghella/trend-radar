# Streamlit boot theme. Default is "light" to match the in-app theme toggle's
# default; if the user flips to Dark, app.py's CSS injection repaints the whole
# surface (Streamlit can't swap base at runtime). Setting base correctly avoids
# the brief flash of the opposite theme on first paint.

[theme]
base = "light"
primaryColor = "#22C55E"            # buttons, sliders, active tab underline
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
