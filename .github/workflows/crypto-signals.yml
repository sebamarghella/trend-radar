name: Trend Radar Crypto Signals

on:
  schedule:
    # 00:30 UTC daily, after the 00:00 UTC daily crypto bar closes.
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trend-radar-crypto-signals
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-alerts.txt

      - name: Install dependencies
        run: pip install -r requirements-alerts.txt

      - name: Export crypto signals JSON
        env:
          TR_INTERVAL_MINUTES: '1440'
        run: python export_crypto_signals.py

      - name: Commit crypto signals JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/crypto_signals.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update crypto signals [skip ci]"
            git push
          else
            echo "No crypto signal changes."
          fi
