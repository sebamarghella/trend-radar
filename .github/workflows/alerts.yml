name: Trend Radar Alerts

on:
  schedule:
    # 00:05 UTC daily — 5 min after the daily Binance bar closes.
    # GitHub cron jitter is ~5-15 min during peak load, fine for daily TF.
    - cron: '5 0 * * *'
  workflow_dispatch:  # also runnable from the Actions tab

permissions:
  contents: write  # so the job can commit alerts_state.json back

concurrency:
  group: trend-radar-alerts
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-alerts.txt

      - name: Install dependencies
        run: pip install -r requirements-alerts.txt

      - name: Run alert engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TR_INTERVAL_MINUTES: '1440'
        run: python run_alerts.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -f .cache/alerts_state.json ]]; then
            git add .cache/alerts_state.json
            if ! git diff --staged --quiet; then
              git commit -m "chore: update alert state [skip ci]"
              git push
            else
              echo "No state changes."
            fi
          fi
